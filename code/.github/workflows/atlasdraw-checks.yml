name: Atlasdraw checks

on:
  pull_request:
    branches:
      - main

jobs:
  atlasdraw-checks:
    name: License, patch-guard, telemetry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Check license fields (ADR 0002)
        run: bash scripts/check-license.sh

      # patch-guard step (check-patches.sh, ADR 0004) retired 2026-07-04 per
      # ADR 0010 — the fork is permanent; vendored changes need no register.

      - name: Check telemetry imports (ADR 0006)
        run: bash scripts/check-telemetry.sh
