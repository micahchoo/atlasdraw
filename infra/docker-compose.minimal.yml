# Atlasdraw — minimal self-host stack.
# Single-VPS deployment. SQLite + filesystem blobs. No postgres, no S3,
# no reverse proxy. Run: docker compose -f infra/docker-compose.minimal.yml up
#
# What you get:
#   - localhost:3000 — atlas-app (web)
#   - localhost:4000 — storage server (HTTP API, /health, /maps, /share)
#   - One named volume for the storage server's data (sqlite db + blobs).
#
# Operator overrides via .env or shell env:
#   PUBLIC_URL=https://atlas.example.com  (used in share-link URLs)
#   LOG_LEVEL=debug                       (storage server log level)

services:
  storage:
    build:
      context: ..
      dockerfile: code/apps/storage/Dockerfile
    environment:
      STORAGE_MODE: sqlite-fs
      DATA_DIR: /data
      PORT: "4000"
      PUBLIC_URL: ${PUBLIC_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - atlas-storage-data:/data
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: code/apps/atlas-app/Dockerfile
      args:
        VITE_BUILD_TARGET: hosted
        VITE_STORAGE_BASE_URL: http://localhost:4000
        VITE_PMTILES_PATH: /data/world-low-zoom.pmtiles
    depends_on:
      - storage
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  atlas-storage-data:
