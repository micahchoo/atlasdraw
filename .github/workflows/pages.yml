name: GitHub Pages deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: code/yarn.lock

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
        working-directory: code

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build atlas-app (pages target)
        run: yarn workspace @atlasdraw/atlas-app build
        env:
          VITE_BUILD_TARGET: pages
          VITE_PMTILES_PATH: /atlasdraw/data/world-low-zoom.pmtiles
        working-directory: code

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: code/apps/atlas-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
